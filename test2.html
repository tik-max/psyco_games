<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psycho Memory Test</title>

<style>
body { font-family: Arial; text-align: center; }

.grid {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 20px;
}

.box {
  width: 80px;
  height: 80px;
  border: 2px solid black;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
}

.hidden { background: #ccc; }

#result {
  margin-top: 20px;
  font-size: 18px;
  white-space: pre-line;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  margin-top: 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>Memory Psycho Test</h2>
<p>Press keys <b>1–5</b> to select the different image</p>

<div id="grid" class="grid"></div>

<p id="roundInfo"></p>
<p id="result"></p>
<button id="restartBtn" style="display:none;">Restart</button>

<script>
const grid = document.getElementById("grid");
const result = document.getElementById("result");
const roundInfo = document.getElementById("roundInfo");
const restartBtn = document.getElementById("restartBtn");

const symbols = ["★","☆","◆","●","▲","■","☀","☂","♠","♥"];

let round = 0;
let totalRounds = 15;
let correct = 0;
let wrong = 0;
let correctIndex;
let acceptingInput = false;

function generateShapes() {
  grid.innerHTML = "";
  result.textContent = "";

  if (round >= totalRounds) {
    showFinalResult();
    return;
  }

  round++;
  roundInfo.textContent = `Round ${round} / ${totalRounds}`;

  const sameSymbol = symbols[Math.floor(Math.random() * symbols.length)];
  let diffSymbol;

  do {
    diffSymbol = symbols[Math.floor(Math.random() * symbols.length)];
  } while (diffSymbol === sameSymbol);

  correctIndex = Math.floor(Math.random() * 5);

  let boxes = [];

  for (let i = 0; i < 5; i++) {
    const box = document.createElement("div");
    box.classList.add("box");

    box.textContent = (i === correctIndex) ? diffSymbol : sameSymbol;

    grid.appendChild(box);
    boxes.push(box);
  }

  // Hide after 3 seconds
  setTimeout(() => {
    boxes.forEach(b => {
      b.textContent = "";
      b.classList.add("hidden");
    });
    acceptingInput = true;
  }, 1500);
}

function handleInput(index) {
  if (!acceptingInput) return;

  acceptingInput = false;

  if (index === correctIndex) {
    correct++;
    result.textContent = "✅ Correct!";
  } else {
    wrong++;
    result.textContent = `❌ Wrong! Correct was ${correctIndex + 1}`;
  }

  setTimeout(generateShapes, 1200);
}

// Keyboard controls
document.addEventListener("keydown", (e) => {
  const key = parseInt(e.key);
  if (key >= 1 && key <= 5) {
    handleInput(key - 1);
  }
});

function showFinalResult() {
  grid.innerHTML = "";
  roundInfo.textContent = "Game Over";

  const accuracy = ((correct / totalRounds) * 100).toFixed(2);

  result.textContent =
`===== RESULT =====

Total Rounds : ${totalRounds}
Correct      : ${correct}
Wrong        : ${wrong}
Accuracy     : ${accuracy} %

==================`;

  restartBtn.style.display = "inline-block";
}

restartBtn.onclick = () => {
  round = 0;
  correct = 0;
  wrong = 0;
  restartBtn.style.display = "none";
  generateShapes();
};

// Start game
generateShapes();
</script>

</body>
</html>
