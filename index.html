<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reaction Test Game</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #f5f5f5;
  font-family: Arial;
}

/* Instruction Screen */
#intro {
  text-align: center;
  max-width: 600px;
}

#startBtn {
  margin-top: 20px;
  padding: 12px 25px;
  font-size: 16px;
  cursor: pointer;
}

/* Game Box */
#box {
  width: 50vw;
  height: 50vh;
  max-width: 320px;
  max-height: 320px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  display: none;
}

table {
  margin-top: 20px;
  border-collapse: collapse;
  width: 90%;
  max-width: 800px;
  display: none;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
  text-align: center;
}

th {
  background: #333;
  color: white;
}

tr:nth-child(even) {
  background: #f9f9f9;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
}

#restart {
  display: none;
}
</style>
</head>

<body>

<!-- Instruction Screen -->
<div id="intro">
  <h1>Reaction Test Game</h1>
  <p>
    🔴 R | 🟢 G | 🟡 Y | 🔵 B<br><br>
    Press the correct key quickly.<br>
    If you don't react fast, color will change automatically.<br><br>
    After selecting, hold <b>L for 2 seconds</b> to confirm.<br><br>
    No repeated colors. Stay sharp!
  </p>
  <button id="startBtn">Start Game</button>
</div>

<div id="box"></div>

<table id="table">
<thead>
<tr>
  <th>#</th>
  <th>Result</th>
  <th>Selected</th>
  <th>Actual</th>
  <th>Time (ms)</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button id="restart">Restart</button>

<script>
let box = document.getElementById("box");
let table = document.getElementById("table");
let tbody = table.querySelector("tbody");
let restart = document.getElementById("restart");
let intro = document.getElementById("intro");
let startBtn = document.getElementById("startBtn");

let round = 0;
let selected = null;
let color = null;
let startTime = 0;
let holdTimer = null;
let responseTimer = null;
let holding = false;
let results = [];
let lastColor = null;

/* No repeat color */
function randColor() {
  let colors = [
    {n:"red", v:"red"},
    {n:"green", v:"green"},
    {n:"yellow", v:"yellow"},
    {n:"blue", v:"blue"}
  ];

  let newColor;
  do {
    newColor = colors[Math.floor(Math.random()*colors.length)];
  } while (lastColor && newColor.n === lastColor);

  lastColor = newColor.n;
  return newColor;
}

/* Show color + start reaction timer */
function showColor() {
  let c = randColor();
  color = c.n;
  box.style.background = c.v;
  startTime = Date.now();

  selected = null;
  holding = false;

  clearTimeout(responseTimer);

  responseTimer = setTimeout(() => {
    // ❌ No response → next color
    showColor();
  }, 1000); // adjust difficulty here
}

/* Start game */
function startRound() {
  if (round >= 15) return endGame();
  showColor();
}

/* Finish round */
function finishRound() {
  let correct = color[0];
  let result = "Wrong";
  let time = "-";

  if (selected === correct) {
    result = "Correct";
    time = Date.now() - startTime;
  }

  results.push({
    result,
    selected: selected ? selected.toUpperCase() : "-",
    actual: correct.toUpperCase(),
    time
  });

  round++;

  if (round >= 15) {
    endGame();
  } else {
    showColor(); // next color after hold completes
  }
}

/* Key controls */
document.addEventListener("keydown", e => {
  let k = e.key.toLowerCase();

  // Select color
  if (["r","g","y","b"].includes(k) && !selected) {
    selected = k;
    clearTimeout(responseTimer); // stop auto skip
  }

  // Hold L
  if (k === "l" && selected && !holding) {
    holding = true;

    holdTimer = setTimeout(() => {
      finishRound();
    }, 2000);
  }
});

/* End game */
function endGame() {
  table.style.display = "table";
  restart.style.display = "block";
  box.style.display = "none";

  tbody.innerHTML = "";

  results.forEach((r,i) => {
    let row = `
    <tr>
      <td>${i+1}</td>
      <td>${r.result}</td>
      <td>${r.selected}</td>
      <td>${r.actual}</td>
      <td>${r.time}</td>
    </tr>`;
    tbody.innerHTML += row;
  });
}

/* Restart */
restart.onclick = () => {
  round = 0;
  results = [];
  lastColor = null;
  table.style.display = "none";
  restart.style.display = "none";
  box.style.display = "block";
  startRound();
};

/* Start button */
startBtn.onclick = () => {
  intro.style.display = "none";
  box.style.display = "block";
  startRound();
};
</script>

</body>
</html>
